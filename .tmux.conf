# Set TERM inside tmux panes; must match terminal-features for true color (RGB)
# and Neovim compatibility
set -g default-terminal "screen-256color"
# screen-256color: target terminal type (matches $TERM)
# RGB: enable 24-bit true color
# clipboard: enable OSC 52 clipboard integration via `Ms` capability
# See: https://github.com/tmux/tmux/wiki/Clipboard#setting-the-ms-capability
set -as terminal-features ",screen-256color:RGB:clipboard"
# *: apply to all terminal types
# Ss=\E[%p1%d q: set cursor shape (Normal: block, Insert: bar, Replace: underline)
# Se=\E[2 q: reset cursor to steady block (on mode change or program exit)
# See: https://vi.stackexchange.com/questions/22224/change-neovim-cursor-in-insert-mode-under-st-simple-terminal-and-tmux/22239#22239
set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind C-r rotate-window
unbind C-o

# https://neovim.io/doc/user/faq/#_esc-in-tmux-or-gnu-screen-is-delayed
# https://github.com/tmux/tmux/wiki/Getting-Started#list-of-useful-options
# https://github.com/tmux/tmux/wiki/Modifier-Keys#the-escape-key
# https://github.com/tmux/tmux/wiki/FAQ#what-is-the-escape-time-option-is-zero-a-good-value
#
# tmux >= 3.5 already defaults to 10ms; explicit here for compatibility with older versions
# See: https://github.com/tmux/tmux/blob/3.5/CHANGES
#
# https://man.openbsd.org/tmux#set-option
# -g: session global flag; redundant for server options, paired with -s following Neovim's FAQ
# -s: server option flag; escape-time has always been server-scoped
set -gs escape-time 10

# https://neovim.io/doc/user/options/#'autoread'
# https://github.com/tmux/tmux/wiki/Getting-Started#list-of-useful-options
set -g focus-events on

# https://dev.to/iggredible/the-easy-way-to-copy-text-in-tmux-319g
setw -g mode-keys vi

# https://github.com/tmux/tmux/wiki/Getting-Started#copy-mode-key-bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
